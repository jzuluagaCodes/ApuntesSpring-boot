spring.application.name=apuntes-parcial

# ===== H2 Database (En Memoria para pruebas rápidas) =====
# Descomenta estas líneas para usar H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== PostgreSQL (Para uso real) =====
# Descomenta estas líneas si tienes PostgreSQL corriendo
# spring.datasource.url=jdbc:postgresql://localhost:5432/parcial
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA Configuration =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

server.port=8080
